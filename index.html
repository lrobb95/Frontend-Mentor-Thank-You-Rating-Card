<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Interactive rating component</title>
</head>
<body>
  <main>
    <div class="container">
      <article class="rating-card" id="rating-card">
        <div class="star-bg">
          <img src="images/icon-star.svg" alt="orange star icon">
        </div>
        <h1>How did we do?</h1>
        <p>Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>
        <div class="rate">
          
            <button type="button" class="rating" role="button" data-value="1">1</button>
            <button type="button" class="rating" role="button" data-value="2">2</button>
            <button type="button" class="rating" role="button" data-value="3">3</button>
            <button type="button" class="rating" role="button" data-value="4">4</button>
            <button type="button" class="rating" role="button" data-value="5">5</button>
          
        </div>
        <button type="submit" id="submit-btn" aria-roledescription="submit button">SUBMIT</button>
      </article>
    </div>
    <div class="container">
      <article class="thanks-card" id="thanks-card">
        <img src="images/illustration-thank-you.svg" alt="Image of a credit card and receipt printing out of a printer">
        <div class="p-bg">
          <p id="rating-message"></p>
        </div>
        <h1>Thank you!</h1>
        <p>We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>
        <button class="close-btn" id="close-btn">Close</button>
      </article>
    </div>
        <!-- Thank you state end -->
    </main>
</body>
<script src="main.js"></script>
</html>
